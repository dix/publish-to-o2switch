name: "publish-to-o2switch"
description: "Whitelist runner IP, rsync deploy, then cleanup."
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  o2switch_host:
    description: "O2Switch host (e.g. srv123.o2switch.net)"
    required: true
  o2switch_username:
    description: "O2Switch/cPanel username"
    required: true
  o2switch_api_token:
    description: "O2Switch cPanel API token"
    required: true
  ssh_user:
    description: "SSH user for rsync (defaults to o2switch_username)"
    required: false
    default: ""
  ssh_private_key:
    description: "SSH private key used for rsync"
    required: true
  remote_path:
    description: "Remote path to deploy to"
    required: true
  local_path:
    description: "Local path to deploy from"
    required: false
    default: "./"
  ssh_port:
    description: "SSH port"
    required: false
    default: "22"
  rsync_args:
    description: "Arguments passed to rsync"
    required: false
    default: "-rlgoDzvc -i --delete-after"
  exclude:
    description: "Comma-separated rsync excludes"
    required: false
    default: ""
  use_archive:
    description: "Use tar.gz archive instead of rsync"
    required: false
    default: "false"
  use_releases:
    description: "Deploy to a release directory and update a symlink"
    required: false
    default: "false"
  releases_dir:
    description: "Remote releases directory (required if use_releases=true)"
    required: false
    default: ""
  current_link:
    description: "Remote symlink path for the current release (required if use_releases=true)"
    required: false
    default: ""
  keep_releases:
    description: "Number of releases to keep (use_releases only)"
    required: false
    default: "3"
  skip_cleanup_whitelist:
    description: "Skip cleanup whitelist step"
    required: false
    default: "false"

outputs:
  public_ip:
    description: "Public IP of the GitHub runner"
    value: ${{ steps.public_ip.outputs.public_ip }}

runs:
  using: "composite"
  steps:
    - name: Get runner public IP
      id: public_ip
      shell: bash
      run: |
        set -euo pipefail
        echo "🚀 ==== Get runner public IP (start) ===="
        ip=$(curl -s checkip.amazonaws.com)
        if [ -z "$ip" ]; then
          echo "Failed to fetch public IP" >&2
          exit 1
        fi
        echo "📡 Public IP: ${ip}"
        echo "public_ip=$ip" >> "$GITHUB_OUTPUT"
        echo "✅ ==== Get runner public IP (end) ===="

    - name: Display plan
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        O2SWITCH_USERNAME: ${{ inputs.o2switch_username }}
        SSH_USER: ${{ inputs.ssh_user || inputs.o2switch_username }}
        SSH_PORT: ${{ inputs.ssh_port }}
        LOCAL_PATH: ${{ inputs.local_path }}
        REMOTE_PATH: ${{ inputs.remote_path }}
        RSYNC_ARGS: ${{ inputs.rsync_args }}
        EXCLUDE_LIST: ${{ inputs.exclude }}
        USE_ARCHIVE: ${{ inputs.use_archive }}
        USE_RELEASES: ${{ inputs.use_releases }}
        RELEASES_DIR: ${{ inputs.releases_dir }}
        CURRENT_LINK: ${{ inputs.current_link }}
        KEEP_RELEASES: ${{ inputs.keep_releases }}
        SKIP_CLEANUP_WHITELIST: ${{ inputs.skip_cleanup_whitelist }}
        PUBLIC_IP: ${{ steps.public_ip.outputs.public_ip }}
      run: |
        set -euo pipefail
        echo "🧭 ==== Display plan (start) ===="
        echo "📋 Plan:"
        echo "- public_ip: ${PUBLIC_IP}"
        echo "- o2switch_host: ${O2SWITCH_HOST}"
        echo "- o2switch_username: ${O2SWITCH_USERNAME}"
        echo "- ssh_user: ${SSH_USER}"
        echo "- ssh_port: ${SSH_PORT}"
        echo "- local_path: ${LOCAL_PATH}"
        echo "- remote_path: ${REMOTE_PATH}"
        echo "- rsync_args: ${RSYNC_ARGS}"
        if [ -n "${EXCLUDE_LIST}" ]; then
          echo "- exclude: ${EXCLUDE_LIST}"
        else
          echo "- exclude: (none)"
        fi
        echo "- use_archive: ${USE_ARCHIVE}"
        echo "- use_releases: ${USE_RELEASES}"
        if [ "${USE_RELEASES}" = "true" ]; then
          echo "- releases_dir: ${RELEASES_DIR}"
          echo "- current_link: ${CURRENT_LINK}"
          echo "- keep_releases: ${KEEP_RELEASES}"
        fi
        echo "- skip_cleanup_whitelist: ${SKIP_CLEANUP_WHITELIST}"
        echo "✅ ==== Display plan (end) ===="

    - name: Whitelist IP
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        O2SWITCH_USERNAME: ${{ inputs.o2switch_username }}
        O2SWITCH_API_TOKEN: ${{ inputs.o2switch_api_token }}
        PUBLIC_IP: ${{ steps.public_ip.outputs.public_ip }}
      run: |
        set -euo pipefail
        echo "🔐 ==== Whitelist IP (start) ===="

        auth_header="Authorization: cpanel ${O2SWITCH_USERNAME}:${O2SWITCH_API_TOKEN}"
        base_url="https://${O2SWITCH_HOST}:2083/execute/SshWhitelist"

        echo "🔗 Whitelist endpoint: ${base_url}"
        echo "🔎 Checking existing whitelist entries"
        whitelist_payload=$(curl -sS -f -H "$auth_header" "${base_url}/list")
        normalized_payload=$(printf '%s' "$whitelist_payload" | tr -d '\n')
        if printf '%s' "$normalized_payload" | grep -q "\"address\":\"${PUBLIC_IP}\"[^}]*\"port\":22"; then
          echo "✅ ${PUBLIC_IP} is already whitelisted on port 22"
        else
          echo "➕ Whitelisting ${PUBLIC_IP}"
          curl -sS -f -H "$auth_header" "${base_url}/add?address=${PUBLIC_IP}&port=22" >/dev/null
          echo "✅ Whitelist add request succeeded"
        fi
        echo "✅ ==== Whitelist IP (end) ===="

    - name: Rsync deploy
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        O2SWITCH_USERNAME: ${{ inputs.o2switch_username }}
        SSH_USER: ${{ inputs.ssh_user || inputs.o2switch_username }}
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        SSH_PORT: ${{ inputs.ssh_port }}
        LOCAL_PATH: ${{ inputs.local_path }}
        REMOTE_PATH: ${{ inputs.remote_path }}
        RSYNC_ARGS: ${{ inputs.rsync_args }}
        EXCLUDE_LIST: ${{ inputs.exclude }}
        USE_ARCHIVE: ${{ inputs.use_archive }}
        USE_RELEASES: ${{ inputs.use_releases }}
        RELEASES_DIR: ${{ inputs.releases_dir }}
        CURRENT_LINK: ${{ inputs.current_link }}
        KEEP_RELEASES: ${{ inputs.keep_releases }}
      run: |
        set -euo pipefail
        echo "📦 ==== Deploy (start) ===="

        echo "🔑 Preparing SSH key and deploy"

        key_file=$(mktemp)
        temp_files=()
        temp_files+=("$key_file")
        cleanup_temp_files() {
          echo "🧹 Cleaning temporary files"
          for file in "${temp_files[@]}"; do
            rm -f "$file"
          done
        }
        # Ensure temp SSH key and archive cleanup on any exit path.
        echo "🧼 Setting up temporary file cleanup"
        trap cleanup_temp_files EXIT
        printf "%s\n" "$SSH_PRIVATE_KEY" > "$key_file"
        chmod 600 "$key_file"

        ssh_opts=("-p" "${SSH_PORT}" "-i" "${key_file}" "-o" "StrictHostKeyChecking=no" "-o" "UserKnownHostsFile=/dev/null")
        scp_opts=("-P" "${SSH_PORT}" "-i" "${key_file}" "-o" "StrictHostKeyChecking=no" "-o" "UserKnownHostsFile=/dev/null")

        normalize_remote_path() {
          local input_path="$1"
          local trimmed
          local resolved
          trimmed="${input_path#"${input_path%%[![:space:]]*}"}"
          trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
          if [ -z "$trimmed" ]; then
            echo ""
            return
          fi
          case "$trimmed" in
            /*)
              resolved="$trimmed"
              ;;
            ~)
              resolved="/home/${O2SWITCH_USERNAME}"
              ;;
            ~/*)
              resolved="/home/${O2SWITCH_USERNAME}${trimmed#~}"
              ;;
            *)
              resolved="/home/${O2SWITCH_USERNAME}/${trimmed}"
              ;;
          esac

          if [ "${resolved#"/home/${O2SWITCH_USERNAME}/~"}" != "$resolved" ]; then
            resolved="/home/${O2SWITCH_USERNAME}${resolved#"/home/${O2SWITCH_USERNAME}/~"}"
          fi

          echo "$resolved"
        }

        exclude_args=()
        tar_excludes=()
        if [ -n "$EXCLUDE_LIST" ]; then
          IFS=',' read -r -a exclude_items <<< "$EXCLUDE_LIST"
          for item in "${exclude_items[@]}"; do
            trimmed="${item#"${item%%[![:space:]]*}"}"
            trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
            if [ -n "$trimmed" ]; then
              exclude_args+=("--exclude=$trimmed")
              tar_excludes+=("--exclude=$trimmed")
            fi
          done
        fi

        if [ ${#exclude_args[@]} -gt 0 ]; then
          echo "🧹 Rsync excludes: ${exclude_args[*]}"
        else
          echo "🧹 Rsync excludes: (none)"
        fi

        source_path="$LOCAL_PATH"
        if [ "${source_path%/}" = "$source_path" ]; then
          source_path="${source_path}/"
        fi
        if [ "$USE_RELEASES" = "true" ]; then
          if [ -z "$RELEASES_DIR" ] || [ -z "$CURRENT_LINK" ]; then
            echo "releases_dir and current_link are required when use_releases=true" >&2
            exit 1
          fi
          keep_releases="$KEEP_RELEASES"
          if ! echo "$keep_releases" | grep -Eq '^[0-9]+$'; then
            echo "keep_releases must be a number" >&2
            exit 1
          fi
          if [ "$keep_releases" -lt 1 ]; then
            echo "keep_releases must be >= 1" >&2
            exit 1
          fi
          release_id="${GITHUB_SHA:-manual}"
          ts=$(date +%s%3N)
          releases_base="$RELEASES_DIR"
          if [ -z "$releases_base" ]; then
            echo "releases_dir is required when use_releases=true" >&2
            exit 1
          fi
          resolved_base=$(normalize_remote_path "$releases_base")
          echo "🧭 Resolved releases_dir: ${resolved_base}"
          remote_dir="${resolved_base}/${release_id}_${ts}"
          echo "📁 Creating remote release directory: ${remote_dir}"
          ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "mkdir -p '${remote_dir}'"

          if [ "$USE_ARCHIVE" = "true" ]; then
            archive_file=$(mktemp -u)
            archive_name="release_${release_id}_${ts}.tar.gz"
            archive_file="${archive_file}_${archive_name}"
            temp_files+=("$archive_file")
            echo "🗜️  Creating archive: ${archive_file}"
            tar -czf "$archive_file" "${tar_excludes[@]}" -C "$source_path" .
            echo "⬆️  Uploading archive to ${remote_dir}"
            scp "${scp_opts[@]}" "$archive_file" "${SSH_USER}@${O2SWITCH_HOST}:${remote_dir}/${archive_name}"
            echo "🔎 Verifying archive on remote"
            ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "ls -l '${remote_dir}/${archive_name}'"
            echo "📂 Extracting archive on remote"
            ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "tar -xvzf '${remote_dir}/${archive_name}' -C '${remote_dir}'"
            echo "🧹 Removing archive on remote"
            ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "rm -f '${remote_dir}/${archive_name}'"
          else
            export RSYNC_RSH="ssh ${ssh_opts[*]}"
            echo "🔁 Running rsync to ${remote_dir}"
            rsync ${RSYNC_ARGS} "${exclude_args[@]}" "${source_path}" "${SSH_USER}@${O2SWITCH_HOST}:${remote_dir}"
          fi

          current_link="$CURRENT_LINK"
          if [ -z "$current_link" ]; then
            echo "current_link is required when use_releases=true" >&2
            exit 1
          fi
          resolved_link=$(normalize_remote_path "$current_link")
          echo "🧭 Resolved current_link: ${resolved_link}"
          echo "🔗 Updating current symlink: ${resolved_link} -> ${remote_dir}"
          ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "ln -sfn '${remote_dir}' '${resolved_link}'"
          echo "🧹 Removing old releases (keep ${keep_releases})"
          ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "cd '${resolved_base}' && ls -dt */ | tail -n +$((keep_releases + 1)) | xargs -r rm -rf --"
        else
          resolved_remote_path=$(normalize_remote_path "$REMOTE_PATH")
          echo "🧭 Resolved remote_path: ${resolved_remote_path}"
          if [ -z "$resolved_remote_path" ]; then
            echo "remote_path is required when use_releases=false" >&2
            exit 1
          fi
          if [ "$USE_ARCHIVE" = "true" ]; then
            archive_file=$(mktemp -u)
            archive_name="release_${GITHUB_SHA:-manual}_$(date +%s%3N).tar.gz"
            archive_file="${archive_file}_${archive_name}"
            temp_files+=("$archive_file")
            echo "🗜️  Creating archive: ${archive_file}"
            tar -czf "$archive_file" "${tar_excludes[@]}" -C "$source_path" .
            echo "⬆️  Uploading archive to ${resolved_remote_path}"
            ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "mkdir -p '${resolved_remote_path}'"
            scp "${scp_opts[@]}" "$archive_file" "${SSH_USER}@${O2SWITCH_HOST}:${resolved_remote_path}/${archive_name}"
            echo "🔎 Verifying archive on remote"
            ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "ls -l '${resolved_remote_path}/${archive_name}'"
            echo "📂 Extracting archive on remote"
            ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "tar -xvzf '${resolved_remote_path}/${archive_name}' -C '${resolved_remote_path}'"
            echo "🧹 Removing archive on remote"
            ssh "${ssh_opts[@]}" "${SSH_USER}@${O2SWITCH_HOST}" "rm -f '${resolved_remote_path}/${archive_name}'"
          else
            export RSYNC_RSH="ssh ${ssh_opts[*]}"
            echo "🔁 Running rsync from ${source_path} to ${SSH_USER}@${O2SWITCH_HOST}:${resolved_remote_path}"
            rsync ${RSYNC_ARGS} "${exclude_args[@]}" "${source_path}" "${SSH_USER}@${O2SWITCH_HOST}:${resolved_remote_path}"
          fi
        fi
        echo "✅ Deploy completed"
        echo "✅ ==== Deploy (end) ===="

    - name: Cleanup whitelist
      if: ${{ always() && inputs.skip_cleanup_whitelist != 'true' }}
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        O2SWITCH_USERNAME: ${{ inputs.o2switch_username }}
        O2SWITCH_API_TOKEN: ${{ inputs.o2switch_api_token }}
        PUBLIC_IP: ${{ steps.public_ip.outputs.public_ip }}
      run: |
        set -euo pipefail
        echo "🧼 ==== Cleanup whitelist (start) ===="
        auth_header="Authorization: cpanel ${O2SWITCH_USERNAME}:${O2SWITCH_API_TOKEN}"
        base_url="https://${O2SWITCH_HOST}:2083/execute/SshWhitelist"
        if [ -n "${PUBLIC_IP:-}" ]; then
          echo "🧽 Cleaning up whitelist for ${PUBLIC_IP}"
          curl -sS -f -H "$auth_header" "${base_url}/remove?address=${PUBLIC_IP}&direction=in&port=22" >/dev/null 2>&1 || true
          curl -sS -f -H "$auth_header" "${base_url}/remove?address=${PUBLIC_IP}&direction=out&port=22" >/dev/null 2>&1 || true
          echo "✅ Cleanup complete"
        else
          echo "⚠️  No public IP available for cleanup"
        fi
        echo "✅ ==== Cleanup whitelist (end) ===="
