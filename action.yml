name: "publish-to-o2switch"
description: "Whitelist runner IP, rsync deploy, then cleanup."
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  o2switch_host:
    description: "O2Switch host (e.g. srv123.o2switch.net)"
    required: true
  o2switch_username:
    description: "O2Switch/cPanel username"
    required: true
  o2switch_api_token:
    description: "O2Switch cPanel API token"
    required: true
  ssh_user:
    description: "SSH user for rsync (defaults to o2switch_username)"
    required: false
    default: ""
  ssh_private_key:
    description: "SSH private key used for rsync"
    required: true
  remote_path:
    description: "Remote path to deploy to"
    required: true
  local_path:
    description: "Local path to deploy from"
    required: false
    default: "./"
  ssh_port:
    description: "SSH port"
    required: false
    default: "22"
  rsync_args:
    description: "Arguments passed to rsync"
    required: false
    default: "-rlgoDzvc -i --delete-after"
  exclude:
    description: "Comma-separated rsync excludes"
    required: false
    default: ""

outputs:
  public_ip:
    description: "Public IP of the GitHub runner"
    value: ${{ steps.public_ip.outputs.public_ip }}

runs:
  using: "composite"
  steps:
    - name: Get runner public IP
      id: public_ip
      shell: bash
      run: |
        set -euo pipefail
        echo "==== Get runner public IP (start) ===="
        ip=$(curl -s checkip.amazonaws.com)
        if [ -z "$ip" ]; then
          echo "Failed to fetch public IP" >&2
          exit 1
        fi
        echo "public_ip=$ip" >> "$GITHUB_OUTPUT"
        echo "==== Get runner public IP (end) ===="

    - name: Display plan
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        O2SWITCH_USERNAME: ${{ inputs.o2switch_username }}
        SSH_USER: ${{ inputs.ssh_user || inputs.o2switch_username }}
        SSH_PORT: ${{ inputs.ssh_port }}
        LOCAL_PATH: ${{ inputs.local_path }}
        REMOTE_PATH: ${{ inputs.remote_path }}
        RSYNC_ARGS: ${{ inputs.rsync_args }}
        EXCLUDE_LIST: ${{ inputs.exclude }}
        PUBLIC_IP: ${{ steps.public_ip.outputs.public_ip }}
      run: |
        set -euo pipefail
        echo "==== Display plan (start) ===="
        echo "Plan:"
        echo "- public_ip: ${PUBLIC_IP}"
        echo "- o2switch_host: ${O2SWITCH_HOST}"
        echo "- o2switch_username: ${O2SWITCH_USERNAME}"
        echo "- ssh_user: ${SSH_USER}"
        echo "- ssh_port: ${SSH_PORT}"
        echo "- local_path: ${LOCAL_PATH}"
        echo "- remote_path: ${REMOTE_PATH}"
        echo "- rsync_args: ${RSYNC_ARGS}"
        if [ -n "${EXCLUDE_LIST}" ]; then
          echo "- exclude: ${EXCLUDE_LIST}"
        else
          echo "- exclude: (none)"
        fi
        echo "==== Display plan (end) ===="

    - name: Whitelist IP
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        O2SWITCH_USERNAME: ${{ inputs.o2switch_username }}
        O2SWITCH_API_TOKEN: ${{ inputs.o2switch_api_token }}
        PUBLIC_IP: ${{ steps.public_ip.outputs.public_ip }}
      run: |
        set -euo pipefail
        echo "==== Whitelist IP (start) ===="

        auth_header="Authorization: cpanel ${O2SWITCH_USERNAME}:${O2SWITCH_API_TOKEN}"
        base_url="https://${O2SWITCH_HOST}:2083/execute/SshWhitelist"

        echo "Whitelist endpoint: ${base_url}"
        echo "Whitelisting ${PUBLIC_IP}"
        curl -sS -f -H "$auth_header" "${base_url}/add?address=${PUBLIC_IP}&port=22" >/dev/null
        echo "Whitelist add request succeeded"
        echo "==== Whitelist IP (end) ===="

    - name: Rsync deploy
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        SSH_USER: ${{ inputs.ssh_user || inputs.o2switch_username }}
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        SSH_PORT: ${{ inputs.ssh_port }}
        LOCAL_PATH: ${{ inputs.local_path }}
        REMOTE_PATH: ${{ inputs.remote_path }}
        RSYNC_ARGS: ${{ inputs.rsync_args }}
        EXCLUDE_LIST: ${{ inputs.exclude }}
      run: |
        set -euo pipefail
        echo "==== Rsync deploy (start) ===="

        echo "Preparing SSH key and rsync"

        key_file=$(mktemp)
        printf "%s\n" "$SSH_PRIVATE_KEY" > "$key_file"
        chmod 600 "$key_file"

        exclude_args=()
        if [ -n "$EXCLUDE_LIST" ]; then
          IFS=',' read -r -a exclude_items <<< "$EXCLUDE_LIST"
          for item in "${exclude_items[@]}"; do
            trimmed="${item#"${item%%[![:space:]]*}"}"
            trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
            if [ -n "$trimmed" ]; then
              exclude_args+=("--exclude=$trimmed")
            fi
          done
        fi

        if [ ${#exclude_args[@]} -gt 0 ]; then
          echo "Rsync excludes: ${exclude_args[*]}"
        else
          echo "Rsync excludes: (none)"
        fi

        export RSYNC_RSH="ssh -p ${SSH_PORT} -i ${key_file} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        source_path="$LOCAL_PATH"
        if [ "${source_path%/}" = "$source_path" ]; then
          source_path="${source_path}/"
        fi
        echo "Running rsync from ${source_path} to ${SSH_USER}@${O2SWITCH_HOST}:${REMOTE_PATH}"
        rsync ${RSYNC_ARGS} "${exclude_args[@]}" "${source_path}" "${SSH_USER}@${O2SWITCH_HOST}:${REMOTE_PATH}"
        echo "Rsync completed"
        echo "==== Rsync deploy (end) ===="

    - name: Cleanup whitelist
      if: ${{ always() }}
      shell: bash
      env:
        O2SWITCH_HOST: ${{ inputs.o2switch_host }}
        O2SWITCH_USERNAME: ${{ inputs.o2switch_username }}
        O2SWITCH_API_TOKEN: ${{ inputs.o2switch_api_token }}
        PUBLIC_IP: ${{ steps.public_ip.outputs.public_ip }}
      run: |
        set -euo pipefail
        echo "==== Cleanup whitelist (start) ===="
        auth_header="Authorization: cpanel ${O2SWITCH_USERNAME}:${O2SWITCH_API_TOKEN}"
        base_url="https://${O2SWITCH_HOST}:2083/execute/SshWhitelist"
        if [ -n "${PUBLIC_IP:-}" ]; then
          echo "Cleaning up whitelist for ${PUBLIC_IP}"
          curl -sS -f -H "$auth_header" "${base_url}/remove?address=${PUBLIC_IP}&direction=in&port=22" >/dev/null 2>&1 || true
          curl -sS -f -H "$auth_header" "${base_url}/remove?address=${PUBLIC_IP}&direction=out&port=22" >/dev/null 2>&1 || true
          echo "Cleanup complete"
        else
          echo "No public IP available for cleanup"
        fi
        echo "==== Cleanup whitelist (end) ===="
